<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penjualan</title>
</head>
<body>

<div class="navbar">
  <button class="btn-gray" onclick="history.back()">⬅️</button>
  <button class="btn-gray" onclick="location.href='index.html'">🏠</button>
</div>

<h3>Penjualan</h3>

<input id="barang" placeholder="Nama Barang" onkeyup="autoIsiBarang()">
<div id="suggestions"></div>

<input id="qty" type="number" value="1">
<input id="harga" placeholder="Harga">

<select id="satuan">
  <option value="pc">pc</option>
  <option value="pcs">pcs</option>
  <option value="lsn">lsn</option>
</select>

<button class="btn-green" onclick="tambahItem('jual')">+ Tambah</button>

<div id="cart"></div>

<script src="js/app.js"></script>

</body>
</html>
