<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Barang</title>
</head>
<body>


<div class="navbar">
  <button onclick="history.back()">⬅️ Kembali</button>
  <button onclick="location.href='index.html'">🏠 Menu</button>
</div>

<h3>📦 Tambah Barang</h3>

<input id="nama" placeholder="Nama Barang">
<input id="satuan" placeholder="Satuan">
<input id="harga" placeholder="Harga">
<input id="supplier" placeholder="Supplier">

<button onclick="simpan()">Simpan</button>

<script src="js/app.js"> 
function simpan(){
  fetch("https://script.google.com/macros/s/AKfycbwXR9q2IgLzysjgRCYSr1-FpSbOVRF-_hW0xwb6NPE3hSZ-RHI_-WFTcalB6ApwK8zZXw/exec",{
    method:"POST",
    body:JSON.stringify({
      type:"barang",
      barang:nama.value,
      satuan:satuan.value,
      harga:Number(harga.value),
      supplier:supplier.value
    })
  }).then(()=>alert("Tersimpan"));
}
</script>

</body>
</html>
